apiVersion: remi/v1
kind: Pipeline

metadata:
  name: manager-review
  version: "1.0.0"
  description: >
    Two-stage pipeline that generates a structured manager review meeting
    brief from property data. Runs via IngestionPipelineRunner — no chat
    runtime, just sequential LLM calls.

    Stage 1 (analyze): Identifies the top issues, patterns, and risks
    across the manager's properties and produces a structured analysis.

    Stage 2 (brief): Turns the analysis into a meeting-ready brief with
    talking points, recommended questions, and proposed action items.

  tags: [review, managers, internal]
  domain: real-estate
  audience: internal
  chat: false

steps:
  # ---------------------------------------------------------------------------
  # Step 1 — Analyze
  # Fast model. Identify patterns, risks, and priorities from raw data.
  # ---------------------------------------------------------------------------
  - id: analyze
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.1
    max_tokens: 2048
    response_format: json
    system_prompt: |
      You are a real-estate operations analyst preparing for a property manager
      review meeting.

      You receive a JSON payload with:
        - manager: name, company, contact info
        - metrics: occupancy, revenue, loss-to-lease, vacancy loss, maintenance
        - properties: per-property breakdowns with unit counts, occupancy,
          revenue, issues
        - delinquency: tenant-level delinquency data with aging buckets
        - leases: expiring leases within 90 days
        - vacancies: vacant and notice units with days-vacant and listing status
        - existing_actions: any open action items already being tracked
        - notes: timestamped user notes and past meeting context for this manager

      Your job: identify the 3–5 most important patterns and risks.
      Be concise — each theme summary is ONE sentence.

      ## Rules

      - Focus on what MATTERS — find the story, not a data dump.
      - Max 5 themes. If fewer are significant, return fewer.
      - Group by theme (revenue leakage, turnover risk, maintenance
        backlog, collection problems, marketing gaps).
      - Flag systemic patterns vs. isolated incidents.
      - Consider existing action items — don't re-flag things already tracked.
      - Reference any user notes that provide context (e.g. prior meeting
        discussions, known situations).
      - Include 1–3 positive observations.

      RESPOND ONLY WITH VALID JSON:
      {
        "themes": [
          {
            "id": "revenue_leakage",
            "title": "Revenue Leakage",
            "severity": "high",
            "summary": "One sentence.",
            "affected_properties": ["property names"],
            "monthly_impact": 1500.00
          }
        ],
        "positive_notes": ["What's going well — max 3"]
      }

    input_template: |
      {input}

  # ---------------------------------------------------------------------------
  # Step 2 — Brief
  # Capable model. Generate a meeting-ready document from the analysis.
  # ---------------------------------------------------------------------------
  - id: brief
    provider: anthropic
    model: claude-sonnet-4-20250514
    temperature: 0.3
    max_tokens: 4096
    response_format: json
    system_prompt: |
      You are a real-estate operations director preparing a meeting brief
      for a property manager review.

      You receive:
        - analysis: structured themes and patterns from the analyst
        - The original property data (including any user notes / past context)

      Produce a concise, meeting-ready brief for a 30-minute conversation.
      Prioritize ruthlessly — a director should scan this in under a minute.

      ## Rules

      - ONE paragraph executive summary. Lead with the single biggest issue.
      - Max 4 agenda items, ordered by impact. Each item:
        - 1–2 talking points (cite specific properties/tenants/units)
        - 1 question to ask the manager (open-ended, collaborative tone)
        - 1–2 suggested actions (title + owner + timeframe only)
      - If user notes mention prior discussions, reference them
        (e.g. "Last meeting you discussed X — here's the update").
      - Acknowledge 1–2 positives briefly.
      - Suggest a follow-up timeframe.

      RESPOND ONLY WITH VALID JSON:
      {
        "manager_name": "Name",
        "summary": "One paragraph executive summary.",
        "agenda": [
          {
            "topic": "Topic title",
            "severity": "high|medium|low",
            "talking_points": ["Specific point with data — max 2"],
            "questions": ["One open-ended question"],
            "suggested_actions": [
              {
                "title": "Action item title",
                "owner": "manager|director|both",
                "timeframe": "this week|next 2 weeks|this month"
              }
            ]
          }
        ],
        "positives": ["1-2 things to acknowledge"],
        "follow_up_date": "Suggested next check-in timeframe"
      }

    input_template: |
      Analysis:
      {steps.analyze}

      Raw property data:
      {input}
