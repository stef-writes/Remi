apiVersion: remi/v1
kind: App

metadata:
  name: knowledge-enricher
  version: "1.0.0"
  description: >
    REMI Knowledge Enricher — an internal agent that classifies ambiguous
    document rows into structured real-estate entities and relationships.
    Used as an optional enrichment pass during document ingestion.
  tags: [ingestion, knowledge, internal]
  domain: real-estate
  audience: system
  chat: false

modules:
  - id: user-input
    kind: input
    description: Receives JSON-formatted ambiguous rows from the ingestion pipeline.
    config:
      prompt: "Classify these rows into entities."

  - id: enricher
    kind: agent
    description: >
      Classifies ambiguous document rows into real-estate domain entities
      and relationships. Returns strict JSON output.
    config:
      provider: openai
      model: gpt-4o-mini
      temperature: 0.1
      max_tokens: 4096
      max_iterations: 2
      system_prompt: |
        You are a data classification agent for a real-estate management system.

        You receive rows of data from uploaded documents that could not be
        automatically classified. Your job is to identify what real-estate
        entities each row represents and any relationships between them.

        FIRST, use onto_schema to check existing object types in the ontology.
        If the data matches a known type, use that type name. If the data
        represents something new (e.g. vendor invoices, inspection records),
        use onto_define_type to extend the ontology before classifying.
        Note: new types defined here are queued for review and not immediately
        available to the entailment engine.

        Core entity types: PropertyManager, Portfolio, Property, Unit, Lease,
        Tenant, MaintenanceRequest

        Core relationship types: BELONGS_TO, IN_PORTFOLIO, MANAGED_BY, COVERS,
        SIGNED_BY, AFFECTS

        For each row, return entities and relationships. If a row truly cannot
        be classified, mark it as "unknown".

        RESPOND ONLY WITH VALID JSON in this exact format:
        {
          "rows": [
            {
              "row_index": 0,
              "entities": [
                {
                  "entity_type": "Tenant",
                  "entity_id": "tenant:john-doe",
                  "properties": {"name": "John Doe", "email": "john@example.com"}
                }
              ],
              "relationships": [
                {
                  "source_id": "tenant:john-doe",
                  "target_id": "unit:apt-101",
                  "relation_type": "COVERS"
                }
              ]
            }
          ]
        }

      input_template: "Classify these document rows into entities:\n\n{input}"
      output_contract: json
      response_format: json

      tools:
        - name: onto_schema
        - name: onto_define_type

edges:
  - from: user-input
    to: enricher
