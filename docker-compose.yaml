services:

  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: remi
      POSTGRES_USER: remi
      POSTGRES_PASSWORD: remi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remi"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── API (production) ──────────────────────────────────────────────────────
  # Profiles: prod
  #
  # The API runs a single uvicorn worker.  For multi-worker setups use
  # gunicorn + uvicorn workers behind a load balancer and set
  # REMI_API__INTERNAL_API_URL to the internal service address so the
  # sandbox SDK can reach any worker.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: remi-api:latest
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://remi:remi@postgres:5432/remi
      REMI_SANDBOX__BACKEND: docker
      REMI_SANDBOX__NETWORK: remi_sandbox
      REMI_API__INTERNAL_API_URL: http://api:8000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default
      - remi_sandbox
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - prod

  # ── Frontend (production) ────────────────────────────────────────────────
  # Profiles: prod
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    image: remi-frontend:latest
    environment:
      NEXT_PUBLIC_API_URL: ""
    depends_on:
      - api
    profiles:
      - prod

  # ── Nginx reverse proxy ─────────────────────────────────────────────────
  # Profiles: prod
  #
  # Single origin for frontend + API.  In production, add TLS termination
  # via certbot sidecar or an upstream load balancer.
  nginx:
    image: nginx:1-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    profiles:
      - prod

  # ── Sandbox image build helper ────────────────────────────────────────────
  # Profiles: build
  #
  # Not a running service — used only to build and tag the sandbox image
  # so the API can spawn it via Docker.
  #   docker compose --profile build build sandbox
  sandbox:
    build:
      context: sandbox
      dockerfile: Dockerfile
    image: remi-sandbox:latest
    profiles:
      - build

networks:
  default:
    driver: bridge
  remi_sandbox:
    driver: bridge
    internal: true

volumes:
  pgdata:
  redisdata:
